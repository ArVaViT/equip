<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/icon.svg" />
    <link rel="canonical" href="https://equipbible.com/" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Equip — системное изучение Библии для тех, кто относится к Писанию серьёзно. Курсы, прогресс, сертификаты. Русский и английский." />
    <meta name="theme-color" content="#422277" />

    <!-- Open Graph + Twitter share-preview cards. Static defaults are
         intentional: the SPA renders client-side, so anything dynamic
         set by React would be invisible to the unfurlers (FB, LinkedIn,
         Slack, Telegram, X) which only fetch the raw HTML. og:image
         is a 29 KB JPEG (1200x630) compressed from the dev.to cover. -->
    <meta property="og:title" content="Equip — изучение Библии" />
    <meta property="og:description" content="Системное изучение Библии: курсы, главы, тесты, сертификаты. Бесплатно." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://equipbible.com/" />
    <meta property="og:image" content="https://equipbible.com/og-image.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Equip — современная платформа для изучения Библии" />
    <meta property="og:site_name" content="Equip" />
    <meta property="og:locale" content="ru_RU" />
    <meta property="og:locale:alternate" content="en_US" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Equip — изучение Библии" />
    <meta name="twitter:description" content="Системное изучение Библии: курсы, главы, тесты, сертификаты. Бесплатно." />
    <meta name="twitter:image" content="https://equipbible.com/og-image.jpg" />

    <!-- Schema.org structured data for Google. Three pieces:
           1. Organization — entity profile (logo, name, url).
           2. WebSite — declares the search URL pattern so Google
              renders the sitelinks search box under our main result
              when the SERP shows a brand query like "equipbible".
              The query maps to /courses?search={...} which the
              catalog page already supports.
           3. EducationalOrganization — extra signal for the
              "учебная платформа" classification. -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@graph": [
        {
          "@type": "Organization",
          "@id": "https://equipbible.com/#organization",
          "name": "Equip",
          "url": "https://equipbible.com/",
          "logo": "https://equipbible.com/icon.svg",
          "description": "Системное изучение Библии для тех, кто относится к Писанию серьёзно."
        },
        {
          "@type": "WebSite",
          "@id": "https://equipbible.com/#website",
          "url": "https://equipbible.com/",
          "name": "Equip",
          "inLanguage": ["ru-RU", "en-US"],
          "publisher": { "@id": "https://equipbible.com/#organization" },
          "potentialAction": {
            "@type": "SearchAction",
            "target": {
              "@type": "EntryPoint",
              "urlTemplate": "https://equipbible.com/courses?search={search_term_string}"
            },
            "query-input": "required name=search_term_string"
          }
        },
        {
          "@type": "EducationalOrganization",
          "@id": "https://equipbible.com/#edu",
          "name": "Equip",
          "url": "https://equipbible.com/",
          "logo": "https://equipbible.com/icon.svg",
          "sameAs": ["https://github.com/ArVaViT/equip"]
        }
      ]
    }
    </script>

    <title>Equip — изучение Библии онлайн</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
