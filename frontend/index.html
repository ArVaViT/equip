<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Bible School - Modern Learning Management System for Bible study courses" />
    <meta name="theme-color" content="#2563eb" />

    <!-- Open Graph + Twitter share-preview cards. Static defaults are
         intentional: the SPA renders client-side, so anything dynamic
         set by React would be invisible to the unfurlers (FB, LinkedIn,
         Slack, Telegram, X) which only fetch the raw HTML. og:image
         is a 29 KB JPEG (1200x630) compressed from the dev.to cover. -->
    <meta property="og:title" content="Bible School LMS" />
    <meta property="og:description" content="Enroll in Bible study courses, track your progress, and deepen your understanding." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://biblie-school-frontend.vercel.app/" />
    <meta property="og:image" content="https://biblie-school-frontend.vercel.app/og-image.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Bible School LMS — modern learning platform for Bible study" />
    <meta property="og:site_name" content="Bible School LMS" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Bible School LMS" />
    <meta name="twitter:description" content="Enroll in Bible study courses, track your progress, and deepen your understanding." />
    <meta name="twitter:image" content="https://biblie-school-frontend.vercel.app/og-image.jpg" />

    <title>Bible School LMS</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
