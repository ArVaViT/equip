target-version = "py312"
line-length = 120

[lint]
select = [
  "E",     # pycodestyle errors
  "W",     # pycodestyle warnings
  "F",     # pyflakes
  "I",     # isort
  "UP",    # pyupgrade
  "B",     # flake8-bugbear
  "SIM",   # flake8-simplify
  "TCH",   # flake8-type-checking
  "RUF",   # ruff-specific
]
ignore = [
  "E501",   # line too long — handled by formatter
  "B008",   # function-call-in-default-argument — FastAPI Depends pattern
  "E712",   # true-false-comparison — SQLAlchemy requires == True/False for SQL generation
  "SIM102", # collapsible-if — sometimes readability is better with nested ifs
  "UP007",  # use X | Y for union — we already use __future__.annotations
]

[lint.isort]
known-first-party = ["app"]

[lint.per-file-ignores]
# Bible book alias tables and verse-substitution tests intentionally
# contain Cyrillic letters that look ambiguous to RUF001/002/003 — the
# whole point of the file is recognizing the Russian forms verbatim.
"app/services/bible/books.py" = ["RUF001", "RUF002", "RUF003"]
"app/services/bible/references.py" = ["RUF001", "RUF002", "RUF003"]
"app/services/bible/substitution.py" = ["RUF001", "RUF002", "RUF003"]
"tests/test_bible_substitution.py" = ["RUF001", "RUF002", "RUF003"]

[format]
quote-style = "double"
indent-style = "space"
