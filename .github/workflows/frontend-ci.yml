name: Frontend CI

# Triggers on every push to main and every PR targeting main, without a
# top-level `paths:` filter. See backend-ci.yml for the full rationale —
# the same always-run + detect-changes + aggregator pattern applies here.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: frontend-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Detect frontend-relevant changes
        id: filter
        run: |
          set -e
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
            HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          else
            BASE_SHA="${{ github.event.before }}"
            HEAD_SHA="${{ github.sha }}"
            if [ "$BASE_SHA" = "0000000000000000000000000000000000000000" ]; then
              BASE_SHA="$(git rev-parse "$HEAD_SHA^")"
            fi
          fi
          echo "Comparing $BASE_SHA..$HEAD_SHA"
          CHANGED=$(git diff --name-only "$BASE_SHA" "$HEAD_SHA" || true)
          echo "Changed files:"
          echo "$CHANGED"
          if echo "$CHANGED" | grep -qE '^frontend/|^\.github/workflows/frontend-ci\.yml$'; then
            echo "frontend=true" >> "$GITHUB_OUTPUT"
            echo "Frontend changes detected — heavy jobs will run."
          else
            echo "frontend=false" >> "$GITHUB_OUTPUT"
            echo "No frontend changes — heavy jobs will be skipped."
          fi

  lint-and-build:
    needs: detect-changes
    if: needs.detect-changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    env:
      VITE_API_URL: ${{ vars.CI_VITE_API_URL || 'https://example.invalid' }}
      VITE_SUPABASE_URL: ${{ vars.CI_VITE_SUPABASE_URL || 'https://example.supabase.co' }}
      VITE_SUPABASE_ANON_KEY: ${{ secrets.CI_VITE_SUPABASE_ANON_KEY || 'ci-placeholder-not-real' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          # jsdom@>=28 and vitest@>=4 declare engines ^20.19.0 || ^22.12.0 || >=24.0.0,
          # so we need 22.12+ specifically (not just "22" which resolves to 22.0.0).
          # Pin to a concrete 22.x release that satisfies the constraint.
          # Keep in sync with package.json "engines".
          node-version: '22.18.0'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      # `npm ci` enforces that package-lock.json matches package.json and performs
      # a clean install into a fresh node_modules — required for reproducible CI
      # builds. Fails fast if someone forgets to commit an updated lockfile.
      - name: Install dependencies
        run: npm ci --no-fund

      # Fail on HIGH or CRITICAL advisories in production dependencies. Moderate
      # and below are reported but don't block merges; we triage those via the
      # Dependabot queue rather than blocking every PR.
      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=high

      # ESLint 10 flat config resolves file patterns via its own config;
      # the legacy --ext flag was removed, and `tsx`/`ts` file matching is
      # defined inside eslint.config.js instead.
      - name: Run ESLint (zero warnings)
        run: npx eslint . --report-unused-disable-directives --max-warnings 0

      # Catches drift between en.json and ru.json — every English key must have
      # a Russian counterpart (with Russian-only `_few`/`_many` plurals allowed).
      - name: Check i18n locale parity
        run: npm run i18n:check

      - name: Typecheck with TypeScript (strict)
        run: npx tsc --noEmit

      - name: Build production bundle
        run: npm run build

      - name: Run unit tests
        run: npm run test:run

  # ---------------------------------------------------------------------------
  # Required-check aggregator. See the matching block in backend-ci.yml for
  # the full rationale.
  # ---------------------------------------------------------------------------
  frontend-ci-pass:
    name: Frontend CI Pass
    needs: [detect-changes, lint-and-build]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Verify frontend CI outcome
        run: |
          set -e
          CHANGED="${{ needs.detect-changes.outputs.frontend }}"
          LB="${{ needs.lint-and-build.result }}"
          echo "frontend_changed=$CHANGED"
          echo "lint-and-build=$LB"
          if [ "$CHANGED" != "true" ]; then
            echo "No frontend changes — auto-pass."
            exit 0
          fi
          if [ "$LB" != "success" ]; then
            echo "::error::Frontend CI failed."
            exit 1
          fi
          echo "Frontend CI succeeded."
