name: Frontend CI

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-ci.yml'
      - '.github/workflows/frontend-ci-fallback.yml'
  pull_request:
    branches: [main]
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-ci.yml'
      - '.github/workflows/frontend-ci-fallback.yml'

permissions:
  contents: read

concurrency:
  group: frontend-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    env:
      VITE_API_URL: ${{ vars.CI_VITE_API_URL || 'https://example.invalid' }}
      VITE_SUPABASE_URL: ${{ vars.CI_VITE_SUPABASE_URL || 'https://example.supabase.co' }}
      VITE_SUPABASE_ANON_KEY: ${{ secrets.CI_VITE_SUPABASE_ANON_KEY || 'ci-placeholder-not-real' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          # jsdom@>=28 and vitest@>=4 declare engines ^20.19.0 || ^22.12.0 || >=24.0.0,
          # so we need 22.12+ specifically (not just "22" which resolves to 22.0.0).
          # Pin to a concrete 22.x release that satisfies the constraint.
          # Keep in sync with package.json "engines".
          node-version: '22.18.0'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      # `npm ci` enforces that package-lock.json matches package.json and performs
      # a clean install into a fresh node_modules — required for reproducible CI
      # builds. Fails fast if someone forgets to commit an updated lockfile.
      - name: Install dependencies
        run: npm ci --no-fund

      # Fail on HIGH or CRITICAL advisories in production dependencies. Moderate
      # and below are reported but don't block merges; we triage those via the
      # Dependabot queue rather than blocking every PR.
      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=high

      # ESLint 10 flat config resolves file patterns via its own config;
      # the legacy --ext flag was removed, and `tsx`/`ts` file matching is
      # defined inside eslint.config.js instead.
      - name: Run ESLint (zero warnings)
        run: npx eslint . --report-unused-disable-directives --max-warnings 0

      # Catches drift between en.json and ru.json — every English key must have
      # a Russian counterpart (with Russian-only `_few`/`_many` plurals allowed).
      - name: Check i18n locale parity
        run: npm run i18n:check

      - name: Typecheck with TypeScript (strict)
        run: npx tsc --noEmit

      - name: Build production bundle
        run: npm run build

      - name: Run unit tests
        run: npm run test:run

  # ---------------------------------------------------------------------------
  # Required-check aggregator. See the matching block in backend-ci.yml for
  # the full rationale. Short version: this job is what the branch ruleset
  # requires; its result mirrors the lint-and-build job above; the mirror
  # workflow `frontend-ci-fallback.yml` produces the same check name on PRs
  # that don't touch frontend/, so a docs-only PR is never stuck waiting
  # for a check that will never report.
  # ---------------------------------------------------------------------------
  frontend-ci-pass:
    name: Frontend CI Pass
    needs: [lint-and-build]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Verify frontend job succeeded
        run: |
          set -e
          LB="${{ needs.lint-and-build.result }}"
          echo "lint-and-build=$LB"
          if [ "$LB" != "success" ]; then
            echo "::error::Frontend CI failed."
            exit 1
          fi
          echo "Frontend CI succeeded."
