name: Backend CI

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci.yml'
      - '.github/workflows/backend-ci-fallback.yml'
  pull_request:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci.yml'
      - '.github/workflows/backend-ci-fallback.yml'

permissions:
  contents: read

concurrency:
  group: backend-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      SUPABASE_URL: ${{ vars.CI_SUPABASE_URL || 'https://example.supabase.co' }}
      SUPABASE_KEY: ${{ secrets.CI_SUPABASE_ANON_KEY || 'ci-placeholder-not-real' }}
      DATABASE_URL: ${{ secrets.CI_DATABASE_URL || 'postgresql://ci:ci@localhost:5432/ci' }}
      JWT_SECRET_KEY: ${{ secrets.CI_JWT_SECRET_KEY || 'ci-only-jwt-secret-not-for-production-use-min-32' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: backend/requirements-ci.txt

      - name: Install dependencies
        run: pip install -r requirements-ci.txt

      # pip-audit scans the runtime requirements against the PyPA advisory db.
      # --strict makes CI fail on any advisory; --ignore-vuln can be added below
      # with a justification (and optional expiry comment) when a fix isn't yet
      # available upstream. We audit requirements.txt (runtime) rather than
      # requirements-ci.txt to avoid noise from dev-only deps.
      - name: Audit runtime dependencies with pip-audit
        run: pip-audit --requirement requirements.txt --strict

      - name: Lint with Ruff
        run: ruff check app/ tests/

      - name: Check formatting with Ruff
        run: ruff format app/ tests/ --check

      # Static type check — covers the entire app/ directory (mypy.ini).
      - name: Type-check with mypy
        run: mypy --config-file mypy.ini

      - name: Verify main entrypoint syntax
        run: python -m py_compile app/main.py

      - name: Compile all application modules
        run: python -m compileall app/ -q

      - name: Verify FastAPI application imports
        run: 'python -c "from app.main import app; print(''OK: FastAPI app imports successfully'')"'

      - name: Run tests with coverage
        run: >-
          python -m pytest tests/
          -vv
          --tb=short
          --cov=app
          --cov-report=term-missing
          --cov-report=xml
          --strict-markers

      - name: Upload coverage XML artifact
        uses: actions/upload-artifact@v7
        if: success() || failure()
        with:
          name: backend-coverage-xml
          path: backend/coverage.xml
          if-no-files-found: warn

  # ---------------------------------------------------------------------------
  # Postgres schema smoke test — validates that the SQLAlchemy models can
  # materialize a valid schema against real Postgres (not just SQLite).
  # This is our cheapest guard against model/prod drift: if a column type or
  # constraint would fail under Postgres, we catch it in CI before deploy.
  # The production schema itself is managed by Supabase migrations (applied
  # via the Supabase CLI / MCP), not from this workflow.
  # ---------------------------------------------------------------------------
  schema-smoke-postgres:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ci -d ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    env:
      SUPABASE_URL: https://example.supabase.co
      SUPABASE_KEY: ci-placeholder-not-real
      DATABASE_URL: postgresql://ci:ci@localhost:5432/ci?sslmode=disable
      JWT_SECRET_KEY: ci-only-jwt-secret-not-for-production-use-min-32

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: backend/requirements-ci.txt

      - name: Install dependencies
        run: pip install -r requirements-ci.txt

      - name: Wait for Postgres
        run: |
          for i in {1..30}; do
            if pg_isready -h localhost -p 5432 -U ci; then
              exit 0
            fi
            sleep 1
          done
          echo "Postgres did not become ready" >&2
          exit 1

      - name: Create schema from SQLAlchemy models and verify core tables
        run: |
          python - <<'PY'
          from sqlalchemy import create_engine, inspect

          import app.models  # noqa: F401 — side-effect: registers every model
          from app.core.database import Base

          engine = create_engine("postgresql://ci:ci@localhost:5432/ci?sslmode=disable")
          Base.metadata.create_all(bind=engine)

          inspector = inspect(engine)
          tables = set(inspector.get_table_names())
          required = {
              "profiles",
              "courses",
              "modules",
              "chapters",
              "chapter_blocks",
              "enrollments",
              "chapter_progress",
              "quizzes",
              "quiz_questions",
              "quiz_options",
              "quiz_attempts",
              "quiz_answers",
              "quiz_extra_attempts",
              "assignments",
              "assignment_submissions",
              "certificates",
              "cohorts",
              "course_reviews",
              "course_prerequisites",
              "course_events",
              "announcements",
              "student_grades",
              "audit_logs",
              "notifications",
              "content_translations",
          }
          missing = required - tables
          if missing:
              raise SystemExit(f"Schema-smoke failed: missing tables on Postgres: {sorted(missing)}")
          print(f"OK: {len(tables)} tables materialized from models, all {len(required)} required tables present")
          PY

  # ---------------------------------------------------------------------------
  # Required-check aggregator. This single job is what the branch ruleset
  # requires on every PR — its result reflects the outcome of every backend
  # job above. `if: always()` ensures it runs even when upstream jobs fail,
  # so the check is *reported red* rather than missing entirely (a missing
  # required check blocks merge indefinitely). The mirror workflow
  # `backend-ci-fallback.yml` produces the same check name on PRs that
  # don't touch backend/, so the required-status-check contract is always
  # satisfied. Keep the workflow `name:` and this job `name:` in sync with
  # the fallback file.
  # ---------------------------------------------------------------------------
  backend-ci-pass:
    name: Backend CI Pass
    needs: [lint-and-test, schema-smoke-postgres]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Verify all backend jobs succeeded
        run: |
          set -e
          LT="${{ needs.lint-and-test.result }}"
          SS="${{ needs.schema-smoke-postgres.result }}"
          echo "lint-and-test=$LT"
          echo "schema-smoke-postgres=$SS"
          if [ "$LT" != "success" ] || [ "$SS" != "success" ]; then
            echo "::error::One or more backend CI jobs failed."
            exit 1
          fi
          echo "All backend CI jobs succeeded."
