name: Backend CI

# Triggers on every push to main and every PR targeting main, without a
# top-level `paths:` filter. The `detect-changes` job below decides
# whether the heavy work (lint, tests, schema smoke) actually runs based
# on a diff of changed files. The aggregator job `Backend CI Pass` always
# runs and reports a single stable check name, which is what the branch
# ruleset requires. This avoids the fallback-workflow gymnastics: one
# workflow, one check name, no concurrency collisions.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: backend-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Determines whether any backend-relevant file changed in this push or PR.
  # The heavy jobs gate on this output so docs-only PRs don't burn CI minutes.
  # ---------------------------------------------------------------------------
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Detect backend-relevant changes
        id: filter
        run: |
          set -e
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
            HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          else
            BASE_SHA="${{ github.event.before }}"
            HEAD_SHA="${{ github.sha }}"
            # event.before is 0000... when a branch is being created. main
            # always has parents, so fall back to the first parent of HEAD.
            if [ "$BASE_SHA" = "0000000000000000000000000000000000000000" ]; then
              BASE_SHA="$(git rev-parse "$HEAD_SHA^")"
            fi
          fi
          echo "Comparing $BASE_SHA..$HEAD_SHA"
          CHANGED=$(git diff --name-only "$BASE_SHA" "$HEAD_SHA" || true)
          echo "Changed files:"
          echo "$CHANGED"
          if echo "$CHANGED" | grep -qE '^backend/|^\.github/workflows/backend-ci\.yml$'; then
            echo "backend=true" >> "$GITHUB_OUTPUT"
            echo "Backend changes detected — heavy jobs will run."
          else
            echo "backend=false" >> "$GITHUB_OUTPUT"
            echo "No backend changes — heavy jobs will be skipped."
          fi

  lint-and-test:
    needs: detect-changes
    if: needs.detect-changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      SUPABASE_URL: ${{ vars.CI_SUPABASE_URL || 'https://example.supabase.co' }}
      SUPABASE_KEY: ${{ secrets.CI_SUPABASE_ANON_KEY || 'ci-placeholder-not-real' }}
      DATABASE_URL: ${{ secrets.CI_DATABASE_URL || 'postgresql://ci:ci@localhost:5432/ci' }}
      JWT_SECRET_KEY: ${{ secrets.CI_JWT_SECRET_KEY || 'ci-only-jwt-secret-not-for-production-use-min-32' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: backend/requirements-ci.txt

      - name: Install dependencies
        run: pip install -r requirements-ci.txt

      # pip-audit scans the runtime requirements against the PyPA advisory db.
      # --strict makes CI fail on any advisory; --ignore-vuln can be added below
      # with a justification (and optional expiry comment) when a fix isn't yet
      # available upstream. We audit requirements.txt (runtime) rather than
      # requirements-ci.txt to avoid noise from dev-only deps.
      - name: Audit runtime dependencies with pip-audit
        run: pip-audit --requirement requirements.txt --strict

      - name: Lint with Ruff
        run: ruff check app/ tests/

      - name: Check formatting with Ruff
        run: ruff format app/ tests/ --check

      # Static type check — covers the entire app/ directory (mypy.ini).
      - name: Type-check with mypy
        run: mypy --config-file mypy.ini

      - name: Verify main entrypoint syntax
        run: python -m py_compile app/main.py

      - name: Compile all application modules
        run: python -m compileall app/ -q

      - name: Verify FastAPI application imports
        run: 'python -c "from app.main import app; print(''OK: FastAPI app imports successfully'')"'

      - name: Run tests with coverage
        run: >-
          python -m pytest tests/
          -vv
          --tb=short
          --cov=app
          --cov-report=term-missing
          --cov-report=xml
          --strict-markers

      - name: Upload coverage XML artifact
        uses: actions/upload-artifact@v7
        if: success() || failure()
        with:
          name: backend-coverage-xml
          path: backend/coverage.xml
          if-no-files-found: warn

      # Upload to Codecov. Public repos with branch protection require
      # an explicit token (tokenless uploads are rejected by Codecov when
      # the target branch is protected); we read it from the
      # `CODECOV_TOKEN` repo secret. `fail_ci_if_error: false` keeps the
      # gate stable if Codecov has an outage -- the artifact above is the
      # durable backup.
      - name: Upload coverage to Codecov (backend)
        uses: codecov/codecov-action@v5
        with:
          files: ./backend/coverage.xml
          flags: backend
          name: backend-coverage
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  # ---------------------------------------------------------------------------
  # Postgres schema smoke test — validates that the SQLAlchemy models can
  # materialize a valid schema against real Postgres (not just SQLite).
  # This is our cheapest guard against model/prod drift: if a column type or
  # constraint would fail under Postgres, we catch it in CI before deploy.
  # The production schema itself is managed by Supabase migrations (applied
  # via the Supabase CLI / MCP), not from this workflow.
  # ---------------------------------------------------------------------------
  schema-smoke-postgres:
    needs: detect-changes
    if: needs.detect-changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ci -d ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    env:
      SUPABASE_URL: https://example.supabase.co
      SUPABASE_KEY: ci-placeholder-not-real
      DATABASE_URL: postgresql://ci:ci@localhost:5432/ci?sslmode=disable
      JWT_SECRET_KEY: ci-only-jwt-secret-not-for-production-use-min-32

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: backend/requirements-ci.txt

      - name: Install dependencies
        run: pip install -r requirements-ci.txt

      - name: Wait for Postgres
        run: |
          for i in {1..30}; do
            if pg_isready -h localhost -p 5432 -U ci; then
              exit 0
            fi
            sleep 1
          done
          echo "Postgres did not become ready" >&2
          exit 1

      - name: Create schema from SQLAlchemy models and verify core tables
        run: |
          python - <<'PY'
          from sqlalchemy import create_engine, inspect

          import app.models  # noqa: F401 — side-effect: registers every model
          from app.core.database import Base

          engine = create_engine("postgresql://ci:ci@localhost:5432/ci?sslmode=disable")
          Base.metadata.create_all(bind=engine)

          inspector = inspect(engine)
          tables = set(inspector.get_table_names())
          required = {
              "profiles",
              "courses",
              "modules",
              "chapters",
              "chapter_blocks",
              "enrollments",
              "chapter_progress",
              "quizzes",
              "quiz_questions",
              "quiz_options",
              "quiz_attempts",
              "quiz_answers",
              "quiz_extra_attempts",
              "assignments",
              "assignment_submissions",
              "certificates",
              "cohorts",
              "course_reviews",
              "course_prerequisites",
              "course_events",
              "announcements",
              "student_grades",
              "audit_logs",
              "notifications",
              "content_translations",
          }
          missing = required - tables
          if missing:
              raise SystemExit(f"Schema-smoke failed: missing tables on Postgres: {sorted(missing)}")
          print(f"OK: {len(tables)} tables materialized from models, all {len(required)} required tables present")
          PY

  # ---------------------------------------------------------------------------
  # Required-check aggregator. This single job is what the branch ruleset
  # requires on every PR. It always runs (independent of detect-changes
  # output) and reports a single stable check name. When backend files were
  # not touched it auto-passes; when they were, it mirrors the result of
  # the heavy jobs above.
  # ---------------------------------------------------------------------------
  backend-ci-pass:
    name: Backend CI Pass
    needs: [detect-changes, lint-and-test, schema-smoke-postgres]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Verify backend CI outcome
        run: |
          set -e
          CHANGED="${{ needs.detect-changes.outputs.backend }}"
          LT="${{ needs.lint-and-test.result }}"
          SS="${{ needs.schema-smoke-postgres.result }}"
          echo "backend_changed=$CHANGED"
          echo "lint-and-test=$LT"
          echo "schema-smoke-postgres=$SS"
          if [ "$CHANGED" != "true" ]; then
            echo "No backend changes — auto-pass."
            exit 0
          fi
          if [ "$LT" != "success" ] || [ "$SS" != "success" ]; then
            echo "::error::Backend CI failed."
            exit 1
          fi
          echo "All backend CI jobs succeeded."
