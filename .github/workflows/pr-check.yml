name: PR Check

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: pr-check-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  pr-quality:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      # Resolves the PR head for same-repo and forked pull requests (SHA fetch alone can miss fork heads).
      - name: Fetch pull request head
        run: git fetch --no-tags origin "pull/${{ github.event.pull_request.number }}/head:refs/heads/pr-head"

      - name: Summarize pull request size
        run: |
          set -euo pipefail
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          echo "Comparing $BASE_SHA..pr-head"
          git diff --stat "$BASE_SHA"..pr-head | tail -1 || true
          FILES=$(git diff --name-only "$BASE_SHA" pr-head | wc -l | tr -d ' ')
          echo "Files changed: $FILES"
          if [ "${FILES:-0}" -gt 50 ]; then
            echo "::warning::Large pull request ($FILES files). Consider splitting for easier review."
          fi

      - name: Flag TODO, FIXME, and HACK in changed sources
        run: |
          set -euo pipefail
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          CHANGED_FILES=$(git diff --name-only "$BASE_SHA" pr-head -- '*.py' '*.ts' '*.tsx' '*.js' '*.jsx' || true)
          if [ -z "$CHANGED_FILES" ]; then
            echo "No matching source files in diff."
            exit 0
          fi
          echo "Scanning changed files for TODO / FIXME / HACK..."
          FOUND=0
          while IFS= read -r f; do
            [ -z "$f" ] && continue
            [ ! -f "$f" ] && continue
            MATCHES=$(grep -nE '\b(TODO|FIXME|HACK)\b' "$f" || true)
            if [ -n "$MATCHES" ]; then
              echo "::notice file=$f::TODO/FIXME/HACK in this file:"
              echo "$MATCHES"
              FOUND=1
            fi
          done <<< "$CHANGED_FILES"
          if [ "$FOUND" -eq 1 ]; then
            echo "::notice::Found TODO/FIXME/HACK in the diff. Resolve or track before merging if appropriate."
          fi

      - name: Block secret and environment files in diff
        run: |
          set -euo pipefail
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          # --diff-filter=d excludes deletions: we want to forbid *adding* or
          # *modifying* secret files, not removing previously committed ones
          # (removal is strictly a cleanup action and must stay easy).
          CHANGED_FILES=$(git diff --name-only --diff-filter=d "$BASE_SHA" pr-head || true)
          # The previous case statement only matched a handful of literal
          # basenames (.env / .env.local / .env.<stage>) and missed common
          # variants the audit flagged: my-app.env, prod.env, keys/prod.json,
          # .envrc, files containing "credentials" anywhere in the path, etc.
          # Switched to a regex on the full path so the matcher catches
          # those without an explicit enumeration.
          PATTERN='(^|/)(\.env(\..*)?|\.envrc|.*[Cc]redentials.*\.(json|ya?ml)|.*service[-_]?account.*\.json)$|.*\.(pem|key|p12|pfx|asc|crt)$'
          FOUND=0
          while IFS= read -r f; do
            [ -z "$f" ] && continue
            if echo "$f" | grep -qE "$PATTERN"; then
              echo "::error file=$f::Forbidden secret/credential file in diff: $f"
              FOUND=1
            fi
          done <<< "$CHANGED_FILES"
          if [ "$FOUND" -eq 1 ]; then
            echo "::error::Remove secret or environment files from the pull request."
            exit 1
          fi
          echo "No blocked secret or environment filenames in diff."
